name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.13"
  RUST_TOOLCHAIN: "1.94.1"

jobs:
  check:
    name: Build and Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce lint and formatting contract
        run: bun run check

      - name: Type-check frontend
        run: bun run typecheck

      - name: Build frontend
        run: bun run build:frontend

      - name: Run frontend and plugin tests
        run: bun run test -- --run

      - name: Generate coverage report
        if: runner.os == 'Linux'
        env:
          USAGEBAR_COVERAGE_REPORT_ONLY: "1"
        run: bun run test:coverage

      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Run Tauri wrapper tests
        run: node --test scripts/tauri/wrapper.test.mjs

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Run Rust backend tests (Linux)
        if: runner.os == 'Linux'
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Compile Rust backend tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --no-run
